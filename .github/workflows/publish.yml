name: .NET

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Dialogative.sln
    - name: Build
      run: dotnet build Dialogative.sln --configuration Release --no-restore
    - name: Test
      run: dotnet test Dialogative.sln --configuration Release --no-build --verbosity normal

    - name: Pack with dotnet
      run: dotnet pack Dialogative/Dialogative.csproj --configuration Release --no-build -o ./artifacts


    - name: Push to Github Packages
      if: github.event_name == 'push'
      run: dotnet nuget push ./artifacts/Dialogative.*.nupkg --source "https://nuget.pkg.github.com/ydinkov/index.json" --api-key ${{ secrets.GH_PACKAGES_TOKEN }} --skip-duplicate


    - name: Push to Nuget
      if: github.event_name == 'push'
      run: dotnet nuget push ./artifacts/Dialogative.*.nupkg -s https://www.nuget.org/ -k ${{ secrets.NUGET_API_KEY }} --skip-duplicate
